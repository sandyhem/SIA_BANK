name: sia_bank
description: A modern banking application built with Flutter, featuring secure authentication, fund transfers, and account management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.3.0
  http: ^1.1.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_screenutil: ^5.9.0
  google_fonts: ^8.0.2
  lottie: ^2.6.0
  smooth_page_indicator: ^1.1.0
  
  # Security
  flutter_secure_storage: ^10.0.0
  pointycastle: ^3.9.0
  crypto: ^3.0.2
  
  # Date & Time
  intl: ^0.19.0
  
  # JSON Serialization
  json_annotation: ^4.8.0
  
  # Logging
  logger: ^2.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Charts for analytics
  fl_chart: ^0.65.0
  
  # Biometric authentication
  
  # Device info

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # Poppins loaded via google_fonts package at runtime
