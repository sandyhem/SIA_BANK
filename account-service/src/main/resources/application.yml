spring:
  datasource:
    url: jdbc:mysql://localhost:3306/account_db
    username: appuser
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${ACCOUNT_SERVER_PORT:8081}
  forward-headers-strategy: framework
  ssl:
    enabled: ${ACCOUNT_SERVICE_TLS_ENABLED:false}
    key-store: ${ACCOUNT_SERVICE_KEY_STORE:}
    key-store-password: ${ACCOUNT_SERVICE_KEY_STORE_PASSWORD:changeit}
    key-store-type: ${ACCOUNT_SERVICE_KEY_STORE_TYPE:PKCS12}

auth:
  service:
    url: ${ACCOUNT_AUTH_SERVICE_URL:http://localhost:8083}

logging:
  level:
    org.springframework: INFO
    com.banking: DEBUG

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# JWT Configuration (must match auth-service secret)
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
